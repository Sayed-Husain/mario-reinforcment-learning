<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif">
  <defs>
    <linearGradient id="conv" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6b8cff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6b8cff" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="fc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e7413c" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#e7413c" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="dual" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4caf50" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#4caf50" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <rect width="900" height="420" rx="8" fill="#141414"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" fill="#888" font-size="12" font-weight="600" letter-spacing="1.5">NETWORK ARCHITECTURE</text>

  <!-- Input -->
  <rect x="20" y="60" width="100" height="90" rx="6" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <rect x="30" y="70" width="35" height="35" rx="2" fill="#333" opacity="0.6"/>
  <rect x="38" y="78" width="35" height="35" rx="2" fill="#444" opacity="0.6"/>
  <rect x="46" y="86" width="35" height="35" rx="2" fill="#555" opacity="0.6"/>
  <rect x="54" y="94" width="35" height="35" rx="2" fill="#666" opacity="0.5"/>
  <text x="70" y="145" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">Input</text>
  <text x="70" y="162" text-anchor="middle" fill="#888" font-size="9">4 x 84 x 84</text>
  <text x="70" y="175" text-anchor="middle" fill="#666" font-size="8">stacked frames</text>

  <!-- Arrow 1 -->
  <line x1="120" y1="105" x2="150" y2="105" stroke="#444" stroke-width="1.5"/>
  <polygon points="148,100 158,105 148,110" fill="#444"/>

  <!-- Conv1 -->
  <rect x="160" y="55" width="110" height="100" rx="6" fill="url(#conv)" stroke="#6b8cff" stroke-width="1" stroke-opacity="0.4"/>
  <text x="215" y="85" text-anchor="middle" fill="#6b8cff" font-size="10" font-weight="600">Conv2d</text>
  <text x="215" y="102" text-anchor="middle" fill="#ccc" font-size="9">32 filters, 8x8</text>
  <text x="215" y="116" text-anchor="middle" fill="#888" font-size="9">stride 4 + ReLU</text>
  <text x="215" y="145" text-anchor="middle" fill="#666" font-size="8">(32, 20, 20)</text>

  <!-- Arrow 2 -->
  <line x1="270" y1="105" x2="300" y2="105" stroke="#444" stroke-width="1.5"/>
  <polygon points="298,100 308,105 298,110" fill="#444"/>

  <!-- Conv2 -->
  <rect x="310" y="55" width="110" height="100" rx="6" fill="url(#conv)" stroke="#6b8cff" stroke-width="1" stroke-opacity="0.4"/>
  <text x="365" y="85" text-anchor="middle" fill="#6b8cff" font-size="10" font-weight="600">Conv2d</text>
  <text x="365" y="102" text-anchor="middle" fill="#ccc" font-size="9">64 filters, 4x4</text>
  <text x="365" y="116" text-anchor="middle" fill="#888" font-size="9">stride 2 + ReLU</text>
  <text x="365" y="145" text-anchor="middle" fill="#666" font-size="8">(64, 9, 9)</text>

  <!-- Arrow 3 -->
  <line x1="420" y1="105" x2="450" y2="105" stroke="#444" stroke-width="1.5"/>
  <polygon points="448,100 458,105 448,110" fill="#444"/>

  <!-- Conv3 -->
  <rect x="460" y="55" width="110" height="100" rx="6" fill="url(#conv)" stroke="#6b8cff" stroke-width="1" stroke-opacity="0.4"/>
  <text x="515" y="85" text-anchor="middle" fill="#6b8cff" font-size="10" font-weight="600">Conv2d</text>
  <text x="515" y="102" text-anchor="middle" fill="#ccc" font-size="9">64 filters, 3x3</text>
  <text x="515" y="116" text-anchor="middle" fill="#888" font-size="9">stride 1 + ReLU</text>
  <text x="515" y="145" text-anchor="middle" fill="#666" font-size="8">(64, 7, 7)</text>

  <!-- Arrow 4 -->
  <line x1="570" y1="105" x2="600" y2="105" stroke="#444" stroke-width="1.5"/>
  <polygon points="598,100 608,105 598,110" fill="#444"/>

  <!-- Flatten -->
  <rect x="610" y="72" width="80" height="65" rx="6" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="650" y="100" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Flatten</text>
  <text x="650" y="118" text-anchor="middle" fill="#888" font-size="9">3,136</text>

  <!-- Standard DQN path (top) -->
  <!-- Arrow to FC -->
  <line x1="690" y1="95" x2="710" y2="75" stroke="#444" stroke-width="1.5"/>
  <polygon points="707,70 717,73 710,80" fill="#444"/>

  <!-- FC 512 -->
  <rect x="720" y="45" width="75" height="55" rx="6" fill="url(#fc)" stroke="#e7413c" stroke-width="1" stroke-opacity="0.4"/>
  <text x="757" y="68" text-anchor="middle" fill="#e7413c" font-size="10" font-weight="600">FC</text>
  <text x="757" y="84" text-anchor="middle" fill="#ccc" font-size="9">512 + ReLU</text>

  <!-- Arrow -->
  <line x1="795" y1="72" x2="815" y2="72" stroke="#444" stroke-width="1.5"/>
  <polygon points="813,67 823,72 813,77" fill="#444"/>

  <!-- Output -->
  <rect x="825" y="45" width="60" height="55" rx="6" fill="url(#fc)" stroke="#e7413c" stroke-width="1" stroke-opacity="0.4"/>
  <text x="855" y="68" text-anchor="middle" fill="#e7413c" font-size="10" font-weight="600">FC</text>
  <text x="855" y="84" text-anchor="middle" fill="#ccc" font-size="9">7 actions</text>

  <!-- Label: Standard -->
  <text x="790" y="38" text-anchor="middle" fill="#888" font-size="9">Standard DQN</text>

  <!-- Dueling path -->
  <!-- Divider -->
  <line x1="710" y1="120" x2="890" y2="120" stroke="#333" stroke-width="0.5" stroke-dasharray="4,4"/>
  <text x="800" y="138" text-anchor="middle" fill="#888" font-size="9">Dueling Architecture</text>

  <!-- Arrow to Value -->
  <line x1="690" y1="105" x2="710" y2="160" stroke="#444" stroke-width="1.5"/>

  <!-- Value stream -->
  <rect x="715" y="148" width="75" height="55" rx="6" fill="url(#dual)" stroke="#4caf50" stroke-width="1" stroke-opacity="0.4"/>
  <text x="752" y="170" text-anchor="middle" fill="#4caf50" font-size="10" font-weight="600">Value</text>
  <text x="752" y="186" text-anchor="middle" fill="#ccc" font-size="9">512 → 1</text>
  <text x="752" y="198" text-anchor="middle" fill="#888" font-size="8">V(s)</text>

  <!-- Advantage stream -->
  <rect x="715" y="215" width="75" height="55" rx="6" fill="url(#dual)" stroke="#4caf50" stroke-width="1" stroke-opacity="0.4"/>
  <text x="752" y="237" text-anchor="middle" fill="#4caf50" font-size="10" font-weight="600">Advantage</text>
  <text x="752" y="253" text-anchor="middle" fill="#ccc" font-size="9">512 → 7</text>
  <text x="752" y="265" text-anchor="middle" fill="#888" font-size="8">A(s,a)</text>

  <!-- Arrow from flatten to advantage -->
  <line x1="690" y1="115" x2="710" y2="240" stroke="#444" stroke-width="1.5"/>

  <!-- Combine arrows -->
  <line x1="790" y1="175" x2="825" y2="195" stroke="#444" stroke-width="1.5"/>
  <line x1="790" y1="242" x2="825" y2="215" stroke="#444" stroke-width="1.5"/>

  <!-- Combine node -->
  <rect x="825" y="190" width="60" height="40" rx="6" fill="url(#dual)" stroke="#4caf50" stroke-width="1" stroke-opacity="0.4"/>
  <text x="855" y="207" text-anchor="middle" fill="#4caf50" font-size="9" font-weight="600">Q(s,a)</text>
  <text x="855" y="222" text-anchor="middle" fill="#888" font-size="7">V + A - mean(A)</text>

  <!-- Legend -->
  <rect x="20" y="320" width="860" height="85" rx="6" fill="#1a1a1a" stroke="#222" stroke-width="1"/>

  <rect x="40" y="340" width="12" height="12" rx="2" fill="#6b8cff" opacity="0.3" stroke="#6b8cff" stroke-width="1" stroke-opacity="0.4"/>
  <text x="60" y="350" fill="#ccc" font-size="10">Convolutional layers (shared backbone, ~1.6M params)</text>

  <rect x="40" y="362" width="12" height="12" rx="2" fill="#e7413c" opacity="0.3" stroke="#e7413c" stroke-width="1" stroke-opacity="0.4"/>
  <text x="60" y="372" fill="#ccc" font-size="10">Fully connected layers (standard DQN head, ~100K params)</text>

  <rect x="40" y="384" width="12" height="12" rx="2" fill="#4caf50" opacity="0.3" stroke="#4caf50" stroke-width="1" stroke-opacity="0.4"/>
  <text x="60" y="394" fill="#ccc" font-size="10">Dueling streams (Rainbow only, separate value and advantage estimation)</text>

  <text x="855" y="394" text-anchor="end" fill="#666" font-size="9">Total: ~1.7M parameters</text>
</svg>
